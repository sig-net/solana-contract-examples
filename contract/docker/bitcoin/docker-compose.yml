services:
  bitcoind:
    image: bitcoin/bitcoin:30
    container_name: btc-regtest
    restart: on-failure
    stop_grace_period: 30s
    command:
      - -regtest=1
      - -server=1
      - -listen=1
      - -txindex=1
      - -rpcuser=test
      - -rpcpassword=test123
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -fallbackfee=0.00001
    ports:
      - 18443:18443
    volumes:
      - bitcoin-data:/home/bitcoin/.bitcoin
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=test", "-rpcpassword=test123", "getblockchaininfo"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  bitcoin-data:
